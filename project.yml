# XcodeGen manifest. `make project` regenerates Aware.xcodeproj from this.
# Keep the manifest as the source of truth — never edit the generated .xcodeproj
# by hand or the next `make project` will clobber it.
#
# Aware is a free, map-first personal-safety app: a situational-awareness map,
# safer routes, live location sharing with trusted contacts, an SOS interface,
# a safety check-in timer, and emergency medical info. Single application target
# plus the shared iUX-ios design system.

name: Aware
configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig
options:
  bundleIdPrefix: ltd.anti
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Same Apple Developer team as the rest of our apps. Xcode auto-generates a
    # development provisioning profile on demand. Override at build time with
    # `DEVELOPMENT_TEAM=<id>` on the xcodebuild command line for a fork.
    DEVELOPMENT_TEAM: 8248296AJX
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO

# Local SwiftPM dependency on the iOS UX library. iUX-ios lives one level up.
packages:
  iUX-ios:
    path: ../iUX-ios

targets:
  Aware:
    type: application
    platform: iOS
    sources:
      - Sources/Aware
      # Live Activity attributes shared with the widget extension.
      - Sources/AwareShared
      # Asset catalog must be a source (not a plain resource) so Xcode runs
      # actool over it and produces Assets.car in the bundle. As a plain
      # resource it would be copied verbatim and iOS wouldn't find the app icon.
      - Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Aware
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "6"
        AntiTrackingAPIKey: $(ANTI_TRACKING_API_KEY)
        # Export compliance: Aware ships no encryption of its own. Auto-clears
        # App Store Connect's "Missing Compliance" prompt.
        ITSAppUsesNonExemptEncryption: false
        # Active SOS / sharing / check-in sessions surface as a Live Activity on
        # the lock screen and Dynamic Island (AwareWidgets extension).
        NSSupportsLiveActivities: true
        # The safety map, "near me" services, safer routes and live sharing all
        # read the user's position.
        NSLocationWhenInUseUsageDescription: >-
          Aware uses your location to show nearby emergency services on the
          safety map, plan safer routes, and share your live position with the
          trusted contacts you choose.
        # SOS, live sharing and the safety check-in timer keep updating your
        # location for your trusted contacts while Aware is backgrounded.
        NSLocationAlwaysAndWhenInUseUsageDescription: >-
          Aware keeps sharing your live location with your chosen trusted
          contacts during an active SOS, live-sharing session or safety timer,
          even when the app is in the background.
        UIBackgroundModes:
          - location
        # Trusted contacts can be imported from the address book.
        NSContactsUsageDescription: >-
          Aware can import people from your contacts to add them as trusted
          safety contacts.
        # Deep links: aware://sos, aware://map. Used by widgets / shortcuts.
        CFBundleURLTypes:
          - CFBundleURLName: ltd.anti.aware
            CFBundleURLSchemes:
              - aware
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # All four orientations — the app is iPad-friendly too.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: iUX-ios
        product: iUXiOS
      # Embed the Live Activity widget extension into the app bundle.
      - target: AwareWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ltd.anti.aware
        TARGETED_DEVICE_FAMILY: "1,2"
        # Tell actool which appiconset in the catalog is the app icon.
        # `AppIcon` matches the directory name under Assets.xcassets.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig

  # ----------------------------------------------------------------
  # Widget extension — hosts the safety Live Activity (lock screen +
  # Dynamic Island). Shares SafetyActivityAttributes with the app.
  # ----------------------------------------------------------------
  AwareWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Sources/AwareWidgets
      - Sources/AwareShared
    info:
      path: Resources/Widgets-Info.plist
      properties:
        CFBundleDisplayName: Aware
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ltd.anti.aware.widgets
        TARGETED_DEVICE_FAMILY: "1,2"
